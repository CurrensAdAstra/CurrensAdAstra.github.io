<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>

<body>

    <!-- Mobile Header -->
    <div class="mobile-header">
        <button
            class="menu-toggle"
            type="button"
            aria-label="사이드바 메뉴 열기"
            aria-controls="sidebar-container"
            aria-expanded="false"
        >☰</button>
        <div class="mobile-header-title">VS Code Theme</div>
    </div>

    <div id="sidebar-container" class="sidebar-container">
        {% include activity_bar.html %}
        {% include sidebar.html %}
    </div>

    <div class="main-area">

        <div class="editor-container">
            <!-- Top Header -->
            <div class="panel-header">{{ page.title }}</div>

            <!-- Main Body: TOC | Content -->
            <div class="editor-body">
                <div class="toc-panel" id="toc-panel">
                    <div class="toc-title">OUTLINE</div>
                    <!-- TOC Content will be injected here or manually placed -->
                </div>

                <div class="content-panel">
                    {{ content }}
                </div>
            </div>
        </div>
    </div>

    <script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>

</html>
